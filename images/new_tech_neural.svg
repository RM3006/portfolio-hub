<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" height="100%">
  <defs>
    <!-- 
     * 1. Embed custom CSS styles for animations matching all homepage vector sections.
    -->
    <style>
      .synapse-line {
        stroke: #888888;
        stroke-width: 0.8;
        fill: none;
        opacity: 0.25;
      }
      
      .synapse-line-main {
        stroke: #222222;
        stroke-width: 1.2;
        fill: none;
        opacity: 0.4;
      }
      
      .synapse-line-active {
        stroke: #111111;
        stroke-width: 1.5;
        fill: none;
        stroke-dasharray: 12, 60;
        animation: synapseFlow 8s linear infinite;
      }
      
      .neural-node {
        fill: #111111;
        animation: nodeGlow 3s ease-in-out infinite alternate;
      }
      
      .neural-node-sub {
        fill: #666666;
        animation: nodeGlow 3s ease-in-out infinite alternate;
        animation-delay: 1.5s;
      }
      
      .neural-core {
        fill: none;
        stroke: #222222;
        stroke-width: 1;
        animation: corePulse 4s ease-in-out infinite alternate;
      }
      
      /* 
       * 2. Apply the identical vertical floating translation to match all homepage sections.
      */
      .floating-group {
        animation: networkFloat 8s ease-in-out infinite;
        transform-origin: center;
      }
      
      @keyframes networkFloat {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0);
        }
      }
      
      @keyframes synapseFlow {
        from {
          stroke-dashoffset: 144;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      
      @keyframes corePulse {
        0% {
          transform: scale(0.9);
          opacity: 0.2;
        }
        100% {
          transform: scale(1.15);
          opacity: 0.6;
        }
      }
      
      @keyframes nodeGlow {
        0% {
          transform: scale(0.9);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.15);
          opacity: 1;
        }
      }
    </style>
  </defs>

  <!-- 
   * 3. Group all neural network components inside the identical floating container.
  -->
  <g class="floating-group">
    
    <!-- 
     * 4. Draw horizontal input and output data synapse routes extending left and right.
    -->
    <path class="synapse-line-main" d="M 100,150 C 200,90 250,90 350,150" />
    <path class="synapse-line-main" d="M 100,150 C 200,210 250,210 350,150" />
    <path class="synapse-line" d="M 150,70 C 220,110 280,110 350,150" />
    <path class="synapse-line" d="M 150,230 C 220,190 280,190 350,150" />
    
    <path class="synapse-line-main" d="M 550,150 C 650,90 700,90 800,150" />
    <path class="synapse-line-main" d="M 550,150 C 650,210 700,210 800,150" />
    <path class="synapse-line" d="M 550,150 C 620,110 680,110 750,70" />
    <path class="synapse-line" d="M 550,150 C 620,190 680,190 750,230" />
    
    <!-- 
     * 5. Animate flowing active data pulses traveling along main pathways.
    -->
    <path class="synapse-line-active" d="M 100,150 C 200,90 250,90 350,150" />
    <path class="synapse-line-active" d="M 100,150 C 200,210 250,210 350,150" />
    
    <path class="synapse-line-active" d="M 550,150 C 650,90 700,90 800,150" />
    <path class="synapse-line-active" d="M 550,150 C 650,210 700,210 800,150" />

    <!-- 
     * 6. Draw the central "neural brain network mesh" structure.
    -->
    <!-- Connection lines between neural cortex nodes -->
    <line class="synapse-line-main" x1="450" y1="150" x2="410" y2="110" />
    <line class="synapse-line-main" x1="450" y1="150" x2="410" y2="190" />
    <line class="synapse-line-main" x1="450" y1="150" x2="490" y2="110" />
    <line class="synapse-line-main" x1="450" y1="150" x2="490" y2="190" />
    <line class="synapse-line-main" x1="450" y1="150" x2="350" y2="150" />
    <line class="synapse-line-main" x1="450" y1="150" x2="550" y2="150" />
    
    <line class="synapse-line" x1="410" y1="110" x2="450" y2="80" />
    <line class="synapse-line" x1="490" y1="110" x2="450" y2="80" />
    <line class="synapse-line" x1="410" y1="190" x2="450" y2="220" />
    <line class="synapse-line" x1="490" y1="190" x2="450" y2="220" />
    
    <line class="synapse-line" x1="350" y1="150" x2="410" y2="110" />
    <line class="synapse-line" x1="350" y1="150" x2="410" y2="190" />
    <line class="synapse-line" x1="550" y1="150" x2="490" y2="110" />
    <line class="synapse-line" x1="550" y1="150" x2="490" y2="190" />
    
    <line class="synapse-line" x1="450" y1="80" x2="450" y2="150" />
    <line class="synapse-line" x1="450" y1="220" x2="450" y2="150" />

    <!-- 
     * 7. Place orbiting structural rings centered around the neural core.
    -->
    <circle class="neural-core" cx="450" cy="150" r="18" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-core" cx="450" cy="150" r="32" style="transform-box: fill-box; transform-origin: center; animation-delay: 2s;" />

    <!-- 
     * 8. Place neural data nodes at synapses junctions.
    -->
    <circle class="neural-node" cx="450" cy="150" r="5.5" style="transform-box: fill-box; transform-origin: center;" />
    
    <circle class="neural-node" cx="410" cy="110" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="410" cy="190" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node" cx="490" cy="110" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="490" cy="190" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    
    <circle class="neural-node-sub" cx="450" cy="80" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="450" cy="220" r="4" style="transform-box: fill-box; transform-origin: center;" />
    
    <!-- Outer connection terminal nodes -->
    <circle class="neural-node" cx="350" cy="150" r="5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node" cx="550" cy="150" r="5" style="transform-box: fill-box; transform-origin: center;" />
    
    <circle class="neural-node" cx="100" cy="150" r="5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node" cx="800" cy="150" r="5" style="transform-box: fill-box; transform-origin: center;" />
    
    <circle class="neural-node-sub" cx="150" cy="70" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="150" cy="230" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="750" cy="70" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="neural-node-sub" cx="750" cy="230" r="4" style="transform-box: fill-box; transform-origin: center;" />
  </g>
</svg>
