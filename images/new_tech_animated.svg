<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="100%" height="100%">
  <defs>
    <!-- 
     * 1. Embed custom CSS styles for animations matching the portfolio's clean visual rules.
    -->
    <style>
      .chip-boundary {
        stroke: #222222;
        stroke-width: 1.5;
        fill: none;
      }
      
      .chip-core {
        stroke: #444444;
        stroke-width: 1.2;
        fill: none;
      }
      
      .data-bus {
        stroke: #888888;
        stroke-width: 1;
        fill: none;
        opacity: 0.3;
      }
      
      .data-bus-active {
        stroke: #333333;
        stroke-width: 1.2;
        fill: none;
        stroke-dasharray: 10, 50;
        animation: dataPulse 6s linear infinite;
      }
      
      .bus-node {
        fill: #111111;
        animation: nodeGlow 3s ease-in-out infinite alternate;
      }
      
      .bus-node-sub {
        fill: #666666;
        animation: nodeGlow 3s ease-in-out infinite alternate;
        animation-delay: 1.5s;
      }
      
      /* 
       * 2. Apply the identical vertical floating translation to match all homepage sections.
      */
      .floating-group {
        animation: chipFloat 8s ease-in-out infinite;
        transform-origin: center;
      }
      
      @keyframes chipFloat {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0);
        }
      }
      
      @keyframes dataPulse {
        from {
          stroke-dashoffset: 120;
        }
        to {
          stroke-dashoffset: 0;
        }
      }
      
      @keyframes nodeGlow {
        0% {
          transform: scale(0.9);
          opacity: 0.7;
        }
        100% {
          transform: scale(1.15);
          opacity: 1;
        }
      }
    </style>
  </defs>

  <!-- 
   * 3. Group all CPU components inside the identical floating container.
  -->
  <g class="floating-group">
    
    <!-- 
     * 4. Draw horizontal parallel data buses extending to left and right.
    -->
    <path class="data-bus" d="M 150,80 L 400,80" />
    <path class="data-bus" d="M 150,115 L 400,115" />
    <path class="data-bus" d="M 150,150 L 400,150" />
    <path class="data-bus" d="M 150,185 L 400,185" />
    <path class="data-bus" d="M 150,220 L 400,220" />
    
    <path class="data-bus" d="M 500,80 L 750,80" />
    <path class="data-bus" d="M 500,115 L 750,115" />
    <path class="data-bus" d="M 500,150 L 750,150" />
    <path class="data-bus" d="M 500,185 L 750,185" />
    <path class="data-bus" d="M 500,220 L 750,220" />
    
    <!-- 
     * 5. Animate flowing data packets traveling along active buses.
    -->
    <path class="data-bus-active" d="M 150,80 L 400,80" />
    <path class="data-bus-active" d="M 150,150 L 400,150" />
    <path class="data-bus-active" d="M 150,220 L 400,220" />
    
    <path class="data-bus-active" d="M 750,115 L 500,115" />
    <path class="data-bus-active" d="M 750,185 L 500,185" />

    <!-- 
     * 6. Draw the central silicon processor CPU microchip.
    -->
    <!-- Outer boundary square frame -->
    <rect class="chip-boundary" x="400" y="60" width="100" height="180" rx="8" />
    
    <!-- Inner square processor core (die) -->
    <rect class="chip-core" x="425" y="110" width="50" height="80" rx="4" />
    
    <!-- Inner heat spreader paths and connections -->
    <line class="data-bus" x1="450" y1="60" x2="450" y2="110" />
    <line class="data-bus" x1="450" y1="190" x2="450" y2="240" />
    <circle class="bus-node" cx="450" cy="150" r="5" style="transform-box: fill-box; transform-origin: center;" />

    <!-- 
     * 7. Place bus endpoint circular data nodes.
    -->
    <circle class="bus-node" cx="150" cy="80" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node-sub" cx="150" cy="115" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="150" cy="150" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node-sub" cx="150" cy="185" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="150" cy="220" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    
    <circle class="bus-node" cx="750" cy="80" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node-sub" cx="750" cy="115" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="750" cy="150" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node-sub" cx="750" cy="185" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="750" cy="220" r="4.5" style="transform-box: fill-box; transform-origin: center;" />
    
    <!-- Chip substrate pin nodes for visual rhythm -->
    <circle class="bus-node" cx="400" cy="60" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="500" cy="60" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="400" cy="240" r="4" style="transform-box: fill-box; transform-origin: center;" />
    <circle class="bus-node" cx="500" cy="240" r="4" style="transform-box: fill-box; transform-origin: center;" />
  </g>
</svg>
